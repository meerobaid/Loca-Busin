<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Owner Dashboard - LocaBusin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="icon" href="data:,">
    <script>
    (async () => {
        const token = localStorage.getItem('token');
        if (!token) {
            alert('You must be logged in to view this page.');
            window.location.href = 'login.html';
            return;
        }
        try {
            const response = await fetch('http://localhost:5000/api/users/me', {
                headers: { 'x-auth-token': token }
            });
            if (!response.ok) throw new Error('Session invalid.');
            
            const user = await response.json();
            if (user.role !== 'owner') {
                alert('Access denied. This dashboard is for Business Owners only.');
                window.location.href = 'index.html'; 
            }
        } catch (error) {
            localStorage.removeItem('token'); 
            window.location.href = 'login.html';
        }
    })();
    </script>
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🏪 Owner Portal</a>
            <div class="d-flex">
                <a class="nav-link text-white me-3" href="index.html">View Main Site</a>
                <button class="btn btn-outline-light btn-sm" id="logout-button">Logout</button>
            </div>
        </div>
    </nav>

    <main class="container my-5">
    <h2 class="mb-4">Welcome to your Dashboard</h2>

    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="list-group shadow-sm">
                <a href="#" id="owner-manage-btn" class="list-group-item list-group-item-action active">My Businesses</a>
                <a href="#" id="owner-bookings-btn" class="list-group-item list-group-item-action">My Bookings</a>
            </div>
        </div>

        <div class="col-md-9">
            
            <div id="owner-businesses-view">
                <div class="card shadow-sm mb-4">
                    <div class="card-header bg-white"><h5 class="mb-0 fw-bold">Add a New Business</h5></div>
                    <div class="card-body">
                        <form id="owner-add-business-form" enctype="multipart/form-data">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Business Name</label>
                                    <input type="text" class="form-control" id="name" name="name" placeholder="e.g., The Local Cafe" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Category</label>
                                    <input type="text" class="form-control" id="category" name="category" placeholder="e.g., Restaurant, Salon" required>
                                </div>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-8 mb-3">
                                    <label class="form-label fw-bold">Address</label>
                                    <input type="text" class="form-control" id="address" name="address" placeholder="Full street address">
                                </div>
                                <div class="col-md-4 mb-3">
                                    <label class="form-label fw-bold">Phone Number</label>
                                    <input type="text" class="form-control" id="phone" name="phone" placeholder="+1 234 567 8900">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Business Description</label>
                                <textarea class="form-control" id="description" name="description" rows="3" placeholder="Tell customers what makes your business special..."></textarea>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Total Capacity</label>
                                    <input type="number" class="form-control" id="capacity" name="capacity" value="10">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Image Upload</label>
                                    <input type="file" class="form-control" id="businessImages" name="businessImages" multiple>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 fw-bold">Publish Business</button>
                        </form>
                    </div>
                </div>

                <h4 class="mb-3">My Listed Businesses</h4>
                <div class="table-responsive shadow-sm bg-white rounded">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Image</th>
                                <th>Name</th>
                                <th>Category</th>
                                <th>Capacity</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="owner-business-list-tbody">
                            <tr><td colspan="5" class="text-center text-muted py-3">Loading businesses...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div> <div id="owner-bookings-view" style="display: none;">
                <h4 class="mb-3">Customer Bookings</h4>
                <div class="table-responsive shadow-sm bg-white rounded">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Customer Name</th>
                                <th>Business</th>
                                <th>Date & Time</th>
                                <th>Quantity</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="owner-bookings-tbody">
                            </tbody>
                    </table>
                </div>
            </div> </div>
    </div>
    </main>
  <div class="modal fade" id="editBusinessModal" tabindex="-1" aria-labelledby="editModalLabel">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="editModalLabel">Edit Business</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form id="edit-business-form">
                    <input type="hidden" id="edit-id"> 
                    
                    <div class="mb-3">
                        <label class="form-label">Business Name</label>
                        <input type="text" class="form-control" id="edit-name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Category</label>
                        <input type="text" class="form-control" id="edit-category" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" id="edit-description" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Save Changes</button>
                </form>
            </div>
        </div>
    </div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script> 
    <script src="js/app.js"></script>
</body>
</html>
