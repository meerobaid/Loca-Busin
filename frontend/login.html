<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LocaBusin</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body{
            background:#f5f7fb;
            min-height:100vh;
        }

        .login-card{
            border:none;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.1);
        }

        .form-control{
            padding:12px;
            border-radius:10px;
        }

        .btn-primary{
            padding:12px;
            border-radius:10px;
            font-weight:600;
        }

        .navbar-brand{
            font-size:1.5rem;
        }
    </style>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">LocaBusin</a>
        </div>
    </nav>

    <!-- Login Form -->
    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-5">

                <div class="card login-card">
                    <div class="card-body p-4">

                        <h2 class="text-center fw-bold mb-4">Login</h2>

                        <form id="login-form">

                            <div class="mb-3">
                                <label class="form-label">Email Address</label>
                                <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="name@example.com"
                                    required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    placeholder="••••••••"
                                    required>
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Login
                            </button>

                            <p class="text-center mt-3 mb-0">
                                Don't have an account?
                                <a href="register.html" class="text-decoration-none">
                                    Sign Up
                                </a>
                            </p>

                        </form>

                        <div class="d-flex align-items-center my-4">
                            <hr class="flex-grow-1">
                            <span class="mx-2 text-muted small">OR</span>
                            <hr class="flex-grow-1">
                        </div>

                        <div id="google-btn-container" class="d-flex justify-content-center"></div>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p class="mb-0">&copy; 2025 LocaBusin. Created by Obaid Ashraf & Team.</p>
    </footer>

</body>
</html>
