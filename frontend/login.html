<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LocaBusin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    
    
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">LocaBusin</a>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                        <div class="card-body p-4">
    <h2 class="card-title text-center mb-4 fw-bold">Login</h2>
    
    <form id="login-form">
        <div class="mb-3">
            <label for="email" class="form-label">Email address</label>
            <input type="email" class="form-control" id="email" required placeholder="name@example.com">
        </div>
        <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn btn-primary w-100 py-2">Login</button>
        <p class="text-center mt-3 mb-0">Don't have an account? <a href="register.html" class="text-decoration-none">Sign Up</a></p>
    </form>

    <div class="d-flex align-items-center my-4">
        <hr class="flex-grow-1 text-muted m-0">
        <span class="mx-2 text-muted small text-uppercase fw-semibold">OR</span>
        <hr class="flex-grow-1 text-muted m-0">
    </div>

    <div id="google-btn-container" class="d-flex justify-content-center"></div>
</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/app.js"></script>
    <footer class="bg-dark text-white text-center p-3 mt-5">
        <p>&copy; 2025 LocaBusin. Created by Obaid Ashraf & Team.</p>
    </footer>
</body>
</html>
