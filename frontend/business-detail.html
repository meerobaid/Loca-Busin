<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Details - LocaBusin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html">LocaBusin</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul id="navbar-links" class="navbar-nav ms-auto">
                </ul>
        </div>
    </div>
</nav>

    <main id="business-detail-content" class="container my-5">
        <div class="col-12 text-center">
            <div class="spinner-border" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </main>
    
    <footer class="bg-dark text-white text-center p-3 mt-auto">
        <p>&copy; 2025 LocaBusin. Created by Obaid Ashraf & Team.</p>
    </footer>
<div class="modal fade" id="editReviewModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Your Review</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="edit-review-form">
                    <input type="hidden" id="edit-review-id">
                    <div class="mb-3">
                        <label for="edit-rating" class="form-label">Rating</label>
                        <select class="form-select" id="edit-rating" required>
                            <option value="5">5 Stars ⭐⭐⭐⭐⭐</option>
                            <option value="4">4 Stars ⭐⭐⭐⭐</option>
                            <option value="3">3 Stars ⭐⭐⭐</option>
                            <option value="2">2 Stars ⭐⭐</option>
                            <option value="1">1 Star ⭐</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label for="edit-comment" class="form-label">Comment</label>
                        <textarea class="form-control" id="edit-comment" rows="3"></textarea>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                        <button type="submit" class="btn btn-primary">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        renderNavbar();
        loadBusinessDetails();
    });
</script>
<script>
  // Simple trick to prevent past dates
  document.getElementById('booking-date').min = new Date().toISOString().split("T")[0];
</script>
</body>
</html>
